name: Deploy

# Deploys to Railway ONLY after the CI workflow succeeds on main.
# This gates production on green tests (backend + frontend + e2e).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    # Only deploy when the triggering CI run actually passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check for Railway token
        id: check
        run: |
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "have_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_token=false" >> "$GITHUB_OUTPUT"
            echo "::notice::RAILWAY_TOKEN secret not set — skipping deploy. See docs/ops/deploy-process.md."
          fi

      - name: Install Railway CLI
        if: steps.check.outputs.have_token == 'true'
        run: npm i -g @railway/cli

      - name: Deploy
        if: steps.check.outputs.have_token == 'true'
        # The stored secret is an ACCOUNT-scoped token, so it's passed as
        # RAILWAY_API_TOKEN (project-scoped tokens use RAILWAY_TOKEN). Link the
        # project explicitly since the CI checkout isn't linked, then deploy.
        run: |
          railway link --project tickertracker-website --environment production --service Ticker-Tracker
          railway up --detach --ci --service Ticker-Tracker
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
