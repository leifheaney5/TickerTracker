# Railway/Nixpacks build: install Node + Python, build the frontend, install
# Python deps. The start command (Procfile) runs gunicorn serving backend/app.py,
# which also serves the built frontend/dist.

[phases.setup]
# Node 22 satisfies vite@8 (needs ^20.19 || >=22.12); python311 for the backend.
nixPkgs = ["nodejs_22", "python311"]

[phases.install]
# The committed lockfile pins every platform's optional native binaries
# (rolldown / rollup linux-x64-gnu). We use `npm install --include=optional`
# rather than `npm ci`: Railway's builder ships an older npm (10.9) than the dev
# machine (11.x), and `npm ci` rejects the newer lockfile format as out-of-sync.
# `npm install` reconciles the version difference while still installing the
# pinned Linux binaries the build needs.
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  "cd frontend && npm install --include=optional --no-audit --no-fund",
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 90"
