<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Ticker Tracker — Pulse: one honest score for every ticker you watch">
  <!-- Ticker Tracker — Open Graph / social share card (1200x630), per docs/brand/og-card-spec.md.
       Brand-default variant: leads with the Pulse dial motif. Colors are the REAL app tokens.
       Honesty: carries the not-advice disclaimer; --down red is never used as a band.
       NOTE: for guaranteed Twitter/X rendering, rasterize this to PNG (1200x630 + 2x) with
       Sora/JetBrains Mono converted to paths — tracked as a follow-up. -->
  <defs>
    <linearGradient id="ogPlate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#14171c"/>
      <stop offset="1" stop-color="#0f1115"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0b0d"/>
  <rect width="1200" height="630" fill="url(#ogPlate)" opacity="0.5"/>
  <rect x="24.5" y="24.5" width="1151" height="581" rx="22" fill="none" stroke="rgba(255,255,255,.07)"/>

  <!-- ── Left column: identity & context ───────────────────────────────────── -->
  <!-- Wordmark: dual-T tile + name -->
  <rect x="64" y="64" width="60" height="60" rx="14" fill="#14171c" stroke="rgba(255,255,255,.12)"/>
  <text x="94" y="106" text-anchor="middle" font-family="'Sora',system-ui,sans-serif" font-weight="800" font-size="30" fill="#3ddc84">TT</text>
  <text x="140" y="106" font-family="'Sora',system-ui,sans-serif" font-weight="800" font-size="34">
    <tspan fill="#e9ebee">Ticker</tspan><tspan fill="#9aa1ab"> Tracker</tspan>
  </text>

  <!-- Headline -->
  <text x="64" y="250" font-family="'Sora',system-ui,sans-serif" font-weight="800" font-size="58" fill="#e9ebee">One honest score</text>
  <text x="64" y="318" font-family="'Sora',system-ui,sans-serif" font-weight="800" font-size="58" fill="#e9ebee">for every ticker.</text>

  <!-- Subhead -->
  <text x="64" y="382" font-family="'Sora',system-ui,sans-serif" font-weight="500" font-size="24" fill="#9aa1ab">Stocks and crypto in one dark dashboard — Pulse reads</text>
  <text x="64" y="416" font-family="'Sora',system-ui,sans-serif" font-weight="500" font-size="24" fill="#9aa1ab">the public signals and shows you the math.</text>

  <!-- Disclaimer (required honesty line) -->
  <text x="64" y="470" font-family="'JetBrains Mono',monospace" font-size="15" fill="#5b626c">Pulse is a transparent summary of public signals — not advice.</text>

  <!-- ── Right column: the Pulse dial (reused geometry, scaled 1.5x) ────────── -->
  <g transform="translate(688,86) scale(1.5)">
    <g transform="rotate(135 160 150)" fill="none" stroke-width="16" stroke-linecap="butt">
      <circle cx="160" cy="150" r="120" stroke="rgba(255,255,255,.12)" stroke-dasharray="565.49 188.49"/>
      <circle cx="160" cy="150" r="120" stroke="#4f8cff" stroke-dasharray="133.37 620.61" stroke-dashoffset="0"/>
      <circle cx="160" cy="150" r="120" stroke="#9aa1ab" stroke-dasharray="133.37 620.61" stroke-dashoffset="-141.37"/>
      <circle cx="160" cy="150" r="120" stroke="#ffb347" stroke-dasharray="133.37 620.61" stroke-dashoffset="-282.74"/>
      <circle cx="160" cy="150" r="120" stroke="#3ddc84" stroke-dasharray="133.37 620.61" stroke-dashoffset="-424.12"/>
    </g>
    <circle cx="263.3" cy="88.9" r="6.5" fill="#ffb347" stroke="#0f1115" stroke-width="3"/>
    <line x1="160" y1="150" x2="244.3" y2="100.1" stroke="#e9ebee" stroke-width="3" stroke-linecap="round"/>
    <circle cx="160" cy="150" r="9" fill="#14171c" stroke="#e9ebee" stroke-width="2.5"/>
    <text x="160" y="158" text-anchor="middle" fill="#e9ebee" font-family="'Sora',system-ui,sans-serif" font-weight="800" font-size="56">72</text>
    <text x="160" y="184" text-anchor="middle" fill="#ffb347" font-family="'Sora',system-ui,sans-serif" font-weight="700" font-size="15" letter-spacing="2.5">BUILDING</text>
    <text x="160" y="232" text-anchor="middle" fill="#9aa1ab" font-family="'JetBrains Mono',monospace" font-size="13" letter-spacing="1">PULSE · EXAMPLE</text>
  </g>

  <!-- ── Footer band ───────────────────────────────────────────────────────── -->
  <line x1="64" y1="540" x2="1136" y2="540" stroke="rgba(255,255,255,.10)"/>
  <text x="64" y="576" font-family="'JetBrains Mono',monospace" font-weight="600" font-size="22" fill="#9aa1ab">tickertracker.info</text>
  <text x="1136" y="576" text-anchor="end" font-family="'Sora',system-ui,sans-serif" font-weight="600" font-size="22" fill="#5b626c">Signal, not noise.</text>
</svg>
