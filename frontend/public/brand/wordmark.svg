<svg xmlns="http://www.w3.org/2000/svg" width="380" height="88" viewBox="0 0 380 88" role="img" aria-label="Ticker Tracker wordmark">
  <!-- Ticker Tracker horizontal lockup. Evolves the existing dual-T app mark
       (frontend/public/favicon.svg): up-green T (#3ddc84) + down-red T (#ff5d73),
       now seated above a Pulse arc that sweeps from cool (#4f8cff) through
       warn (#ffb347) to accent (#3ddc84) — the brand's signature motif.
       Tokens: card #14171c, line2 stroke, tx #e9ebee, tx2 #9aa1ab. -->

  <!-- Icon tile -->
  <rect x="4" y="4" width="80" height="80" rx="18" fill="#14171c"/>
  <rect x="5" y="5" width="78" height="78" rx="17" fill="none" stroke="#23262d" stroke-width="2"/>

  <!-- Pulse arc inside the tile (180deg, cool->warn->hot), behind the T's -->
  <g transform="translate(44 50)" fill="none" stroke-width="4" stroke-linecap="round">
    <path d="M -26 0 A 26 26 0 0 1 -7.93 -24.76" stroke="#4f8cff"/>
    <path d="M -7.93 -24.76 A 26 26 0 0 1 20.78 -15.62" stroke="#ffb347"/>
    <path d="M 20.78 -15.62 A 26 26 0 0 1 26 0" stroke="#3ddc84"/>
  </g>

  <!-- Dual-T mark, scaled/seated from favicon.svg -->
  <g transform="translate(44 44) scale(0.62) translate(-32 -30)">
    <g fill="#3ddc84">
      <rect x="11" y="13" width="22" height="5.5" rx="1.5"/>
      <rect x="19.25" y="13" width="5.5" height="22" rx="1.5"/>
    </g>
    <g fill="#ff5d73">
      <rect x="31" y="29" width="22" height="5.5" rx="1.5"/>
      <rect x="39.25" y="29" width="5.5" height="22" rx="1.5"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text x="104" y="46" fill="#e9ebee" font-family="'Sora',system-ui,sans-serif"
        font-weight="800" font-size="30" letter-spacing="-0.5">Ticker</text>
  <text x="104" y="46" dx="98" fill="#9aa1ab" font-family="'Sora',system-ui,sans-serif"
        font-weight="800" font-size="30" letter-spacing="-0.5">Tracker</text>
  <text x="105" y="68" fill="#5b626c" font-family="'JetBrains Mono',monospace"
        font-size="11.5" letter-spacing="3.5">SIGNAL, NOT NOISE</text>
</svg>
