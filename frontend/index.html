<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Brand icon (the "TT" mark): SVG for modern browsers, PNG fallbacks -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <!-- iOS home-screen / "Add to Home Screen" icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Ticker Tracker" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Android / PWA install -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0a0b0d" />
    <title>Ticker Tracker — One honest score for every ticker you watch</title>
    <meta name="description" content="Stocks and crypto in one dark dashboard. Pulse reads momentum, trend, analyst consensus, and news-headline sentiment into one transparent 0–100 score — with a 'Why' panel that shows the math. No predictions, no advice." />
    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ticker Tracker" />
    <meta property="og:title" content="Ticker Tracker — See what changed. Understand what it means." />
    <meta property="og:description" content="One dark dashboard for the stocks and crypto you care about. Pulse turns momentum, trend, analyst, and news-headline signals into a single transparent score — with the math in plain sight. Not advice." />
    <meta property="og:url" content="https://tickertracker.info/" />
    <meta property="og:image" content="https://tickertracker.info/brand/og-card.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ticker Tracker — Pulse: one honest score for every ticker you watch" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ticker Tracker — one honest score per ticker" />
    <meta name="twitter:description" content="Stocks + crypto in one dark dashboard. Pulse: a transparent 0–100 signal score you can see the math behind. Signal, not noise." />
    <meta name="twitter:image" content="https://tickertracker.info/brand/og-card.png" />
    <!-- Structured data: WebSite + Organization (site-wide) -->
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"WebSite","name":"Ticker Tracker","url":"https://tickertracker.info"}
    </script>
    <script type="application/ld+json">
    {"@context":"https://schema.org","@type":"Organization","name":"Ticker Tracker","url":"https://tickertracker.info","logo":{"@type":"ImageObject","url":"https://tickertracker.info/icon-512.png"}}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
